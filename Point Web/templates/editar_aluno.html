<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="/static/img/point.ico" type="image/x-icon">
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title">Editando: {{ aluno.nome_completo }}</h2>
                <hr>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome Completo *</label>
                            <input type="text" name="nome_completo" class="form-control" value="{{ aluno.nome_completo }}" maxlength="150" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome de Usuário (login) *</label>
                            <input type="text" name="nome_usuario" class="form-control" value="{{ aluno.nome_usuario }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">E-mail *</label>
                            <input type="email" name="email" class="form-control" value="{{ aluno.email }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Telefone</label>
                            <input type="tel" name="telefone" class="form-control" value="{{ aluno.telefone or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CPF *</label>
                            <input type="text" name="cpf" class="form-control" value="{{ aluno.cpf }}" pattern="\d*" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Idade</label>
                            <input type="number" name="idade" class="form-control" value="{{ aluno.idade or '' }}" min="0">
                        </div>
                        <div class="col-md-9 mb-3">
                            <label class="form-label">Naturalidade</label>
                            <input type="text" name="naturalidade" class="form-control" value="{{ aluno.naturalidade or '' }}">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Curso</label>
                            <input type="text" name="curso" class="form-control" value="{{ aluno.curso or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nível</label>
                            <input type="text" name="nivel" class="form-control" value="{{ aluno.nivel or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Instituição</label>
                            <input type="text" name="instituicao" class="form-control" value="{{ aluno.instituicao or '' }}">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Nova Senha (deixe em branco para não alterar)</label>
                            <input type="password" name="senha" class="form-control">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    <a href="{{ url_for('painel_admin', _anchor='consulta') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
