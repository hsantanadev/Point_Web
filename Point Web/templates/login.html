<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POINT PONTO WEB - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="/static/img/point.ico" type="image/x-icon">
    <style>
        body { background-color: #f0f3f5; }
        .login-container { max-width: 450px; margin-top: 10vh; }
        .card-header { background-color: #0d2c54; color: white; }
        .btn-primary { background-color: #0d2c54; border: none; }
    </style>
</head>
<body>
    <div class="container login-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} text-center" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div class="card shadow">
            <div class="card-header text-center p-3">
                <h1 class="h3 mb-0">POINT</h1>
                <p class="mb-0 small" style="letter-spacing: 2px;">PONTO WEB</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="nome_usuario" class="form-label">Usuário:</label>
                        <input type="text" class="form-control" id="nome_usuario" name="nome_usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha:</label>
                        <input type="password" class="form-control" id="senha" name="senha" required>
                    </div>
                    <div class="text-end mb-3">
                        <a href="{{ url_for('esqueci_senha') }}" style="font-size: 0.9rem;">Esqueci a senha</a>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">LOGIN</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    

    
</body>
</html>
